<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sohrab Salimian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f0ede6;
      --fg: #1a1a1a;
      --fg-muted: #7a7670;
      --transition: 1.4s ease;
    }

    :root.dark {
      --bg: #0a0a0a;
      --fg: #e8e4dc;
      --fg-muted: #5a5650;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      transition: background-color var(--transition), color var(--transition);
      font-family: 'EB Garamond', Georgia, serif;
      position: relative;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.08;
      transition: opacity var(--transition);
    }

    /* Corner elements */
    .corner {
      position: fixed;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--fg-muted);
      transition: color var(--transition);
    }

    #mode-indicator {
      top: 1.8rem;
      left: 2rem;
    }

    #location-top {
      top: 1.8rem;
      right: 4.2rem;
    }

    #clock-block {
      bottom: 1.8rem;
      left: 2rem;
      line-height: 1.6;
    }

    #site-url {
      bottom: 1.8rem;
      right: 2rem;
    }

    /* ── Hamburger menu ────────────────────────────────────────────────────── */
    #menu-btn {
      position: fixed;
      top: 1.5rem;
      right: 2rem;
      width: 22px;
      height: 16px;
      cursor: pointer;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: none;
      border: none;
      padding: 0;
    }

    #menu-btn span {
      display: block;
      width: 100%;
      height: 1.5px;
      background-color: var(--fg-muted);
      transition: background-color var(--transition), transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.25s ease;
      transform-origin: center;
    }

    body.menu-open #menu-btn span:nth-child(1) {
      transform: translateY(7.25px) rotate(45deg);
    }
    body.menu-open #menu-btn span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }
    body.menu-open #menu-btn span:nth-child(3) {
      transform: translateY(-7.25px) rotate(-45deg);
    }

    /* ── Menu overlay ──────────────────────────────────────────────────────── */
    #menu-overlay {
      position: fixed;
      inset: 0;
      background-color: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease, background-color var(--transition);
    }

    body.menu-open #menu-overlay {
      opacity: 1;
      pointer-events: all;
    }

    .menu-nav {
      list-style: none;
      text-align: center;
    }

    .menu-nav li {
      margin: 1.2rem 0;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), color 0.2s ease;
    }

    body.menu-open .menu-nav li:nth-child(1) { opacity: 1; transform: translateY(0); transition-delay: 0.08s; }
    body.menu-open .menu-nav li:nth-child(2) { opacity: 1; transform: translateY(0); transition-delay: 0.14s; }
    body.menu-open .menu-nav li:nth-child(3) { opacity: 1; transform: translateY(0); transition-delay: 0.20s; }
    body.menu-open .menu-nav li:nth-child(4) { opacity: 1; transform: translateY(0); transition-delay: 0.26s; }

    .menu-nav a {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--fg-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .menu-nav a:hover {
      color: var(--fg);
    }

    /* ── Main content ──────────────────────────────────────────────────────── */
    .content {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .name-line {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.4em;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    .name {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: normal;
      font-size: clamp(3.2rem, 6.5vw, 6rem);
      font-weight: 400;
      line-height: 1;
      color: var(--fg);
      transition: color var(--transition);
      letter-spacing: -0.01em;
    }

    .phd-tag {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: normal;
      font-size: clamp(1.1rem, 2vw, 1.7rem);
      font-weight: 400;
      color: var(--fg);
      transition: color var(--transition);
      letter-spacing: 0.08em;
    }

    .divider {
      width: clamp(200px, 38vw, 520px);
      height: 1px;
      background-color: var(--fg-muted);
      transition: background-color var(--transition);
      margin: 1.1rem auto 1.0rem auto;
      opacity: 0;
      transform: scaleX(0.4);
      transform-origin: center;
      animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.65s forwards;
    }

    .subtitle {
      font-family: 'EB Garamond', Georgia, serif;
      font-weight: 400;
      line-height: 1.65;
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
      text-align: center;
    }

    .subtitle-primary {
      font-size: clamp(1rem, 1.6vw, 1.35rem);
      color: var(--fg);
      transition: color var(--transition);
      letter-spacing: 0.02em;
    }

    .subtitle-secondary {
      font-size: clamp(0.9rem, 1.4vw, 1.2rem);
      color: #e8e4dc;
      letter-spacing: 0.02em;
    }

    /* ── Social icons ──────────────────────────────────────────────────────── */
    .social-icons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.6rem;
      margin-top: 1.6rem;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 1.15s forwards;
    }

    .social-icons a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fg-muted);
      transition: color 0.25s ease;
      line-height: 1;
    }

    .social-icons a:hover {
      color: var(--fg);
    }

    .social-icons svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }
  </style>

  <script>
    // ── Mode: light 7am–7pm, dark 7pm–7am ──────────────────────────────────
    const root = document.documentElement;
    const modeEl = document.getElementById('mode-indicator');

    function applyMode() {
      const h = new Date().getHours();
      const isDark = h < 7 || h >= 19;
      if (isDark) {
        root.classList.add('dark');
        modeEl.textContent = '— dark —';
      } else {
        root.classList.remove('dark');
        modeEl.textContent = '— light —';
      }
    }

    applyMode();
    setInterval(applyMode, 60_000);

    // ── Live clock ──────────────────────────────────────────────────────────
    const clockEl = document.getElementById('clock');
    function tick() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      clockEl.textContent = `${hh}:${mm}:${ss}`;
    }
    tick();
    setInterval(tick, 1000);

    // ── Hamburger menu toggle ───────────────────────────────────────────────
    document.getElementById('menu-btn').addEventListener('click', () => {
      document.body.classList.toggle('menu-open');
    });

    // ── Joy Division canvas ─────────────────────────────────────────────────
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    const NUM_LINES = 44;
    let time = 0;
    let W, H, lineSpacing, startY;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      const totalHeight = H * 0.74;
      lineSpacing = totalHeight / (NUM_LINES - 1);
      startY = H * 0.13;
    }

    window.addEventListener('resize', resize);
    resize();

    function hash(x, y) {
      const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
      return n - Math.floor(n);
    }

    function noise(x, y) {
      const ix = Math.floor(x), iy = Math.floor(y);
      const fx = x - ix, fy = y - iy;
      const ux = fx * fx * (3 - 2 * fx);
      const uy = fy * fy * (3 - 2 * fy);
      const a = hash(ix,     iy);
      const b = hash(ix + 1, iy);
      const c = hash(ix,     iy + 1);
      const d = hash(ix + 1, iy + 1);
      return a + (b - a) * ux + (c - a) * uy + ((a - b - c + d) * ux * uy);
    }

    function getFgColor() {
      return root.classList.contains('dark') ? '#e8e4dc' : '#1a1a1a';
    }

    // Pre-compute stable per-line properties (seeded so they never change)
    const lines = Array.from({ length: NUM_LINES }, (_, i) => ({
      phaseX  : hash(i,  7) * 50,          // noise x-offset
      phaseY  : hash(i, 13) * 50,          // noise y-offset
      scrollSpd: 0.5 + hash(i, 31) * 1.0, // how fast noise scrolls (0.5–1.5)
      freq    : 0.006 + hash(i, 17) * 0.016, // spatial sine frequency
      sineSpd : 0.8  + hash(i, 61) * 2.2,  // temporal sine speed (0.8–3.0)
      sinePhase: hash(i, 53) * Math.PI * 2, // sine start phase
    }));

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.strokeStyle = getFgColor();
      ctx.lineWidth = 1.3;
      ctx.setLineDash([]);

      for (let i = 0; i < NUM_LINES; i++) {
        const t = i / (NUM_LINES - 1);           // 0 = top row, 1 = bottom row

        // Vertical bell-curve: center rows get full amplitude, top/bottom flatten out
        const vertEnv = Math.exp(-Math.pow((t - 0.5) * 3.2, 2));

        const maxAmp = lineSpacing * 7.0 * vertEnv;
        const y0 = startY + i * lineSpacing;
        const L = lines[i];

        ctx.beginPath();
        const steps = Math.ceil(W / 1.5);

        for (let s = 0; s <= steps; s++) {
          const px = (s / steps) * W;
          const xn = px / W;                     // 0..1 normalized

          // Horizontal Gaussian: activity peaks at center, dies to ~0 at edges
          const horizEnv = Math.exp(-Math.pow((xn - 0.5) * 3.6, 2));

          // Noise: low weight — just organic texture, not the main shape driver
          const nx = s * L.freq * 0.7 + L.phaseX + time * L.scrollSpd;
          const ny = i * 0.4       + L.phaseY + time * L.scrollSpd * 0.4;
          const noiseVal = (noise(nx, ny) - 0.5) * 0.28
                         + (noise(nx * 2.1, ny * 2.1) - 0.5) * 0.12;

          // Sine: main structural wave, fully independent per line
          const rawSine  = Math.sin(px * L.freq + time * L.sineSpd + L.sinePhase);
          // Sharpen: compress valleys, spike the peaks
          const sineVal  = Math.sign(rawSine) * Math.pow(Math.abs(rawSine), 0.55) * 0.70;

          const displacement = (noiseVal + sineVal) * maxAmp * horizEnv;
          const py = y0 - displacement;

          s === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.stroke();
      }

      time += 0.003;
      requestAnimationFrame(draw);
    }

    draw();
  </script>
